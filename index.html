<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COMUNICADO DE SERVIÇO TERCEIRIZADO</title>
<style>
  :root {
    --green: #000000;
    --green-dark: #0F6E56;
    --green-light: #E1F5EE;
    --red: #D85A30;
    --bg: #F7F7F5;
    --card: #FFFFFF;
    --border: rgba(0,0,0,0.1);
    --text: #1a1a18;
    --text-muted: #6b6b67;
    --radius: 12px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 2rem 1rem; }
  .container { max-width: 700px; margin: 0 auto; }
  .header { display: flex; align-items: center; gap: 14px; margin-bottom: 2rem; }
  .logo { width: 48px; height: 48px; background: var(--green); border-radius: 12px; display: flex; align-items: center; justify-content: center; }
  .logo svg { width: 26px; height: 26px; fill: none; stroke: rgb(255, 208, 0); stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .header-text h1 { font-size: 20px; font-weight: 600; }
  .header-text p { font-size: 14px; color: var(--text-muted); margin-top: 2px; }
  .card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); margin-bottom: 1rem; overflow: hidden; }
  .section-header { padding: 1rem 1.25rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
  .section-header span { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--text-muted); }
  .section-body { padding: 1.25rem; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label { font-size: 12px; font-weight: 500; color: var(--text-muted); }
  .field input, .field select { font-size: 14px; padding: 9px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: #fafafa; color: var(--text); outline: none; transition: border-color .15s, box-shadow .15s; }
  .field input:focus, .field select:focus { border-color: var(--green); box-shadow: 0 0 0 3px rgba(29,158,117,.1); background: #fff; }
  .field input[readonly] { background: #f0f0ee; color: var(--text-muted); cursor: default; }
  .route-box { display: grid; grid-template-columns: 1fr 28px 1fr; gap: 10px; align-items: center; }
  .route-arrow { display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-size: 18px; }
  .origin-label { display: flex; align-items: center; gap: 5px; }
  .dot-green { width: 8px; height: 8px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
  .dot-red { width: 8px; height: 8px; border-radius: 50%; background: var(--red); flex-shrink: 0; }
  .radio-group { display: flex; flex-direction: column; gap: 8px; }
  .radio-option { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border: 1px solid var(--border); border-radius: var(--radius-sm); cursor: pointer; transition: all .15s; }
  .radio-option:hover { border-color: var(--green); background: var(--green-light); }
  .radio-option.selected { border-color: var(--green); background: var(--green-light); }
  .radio-option input[type=radio] { accent-color: var(--green); width: 16px; height: 16px; cursor: pointer; }
  .radio-option label { font-size: 13px; font-weight: 500; cursor: pointer; }
  .total-bar { background: var(--text); border-radius: var(--radius); padding: 1.1rem 1.5rem; display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
  .total-bar .label { font-size: 13px; color: rgba(255,255,255,.6); }
  .total-bar .value { font-size: 26px; font-weight: 600; color: #fff; }
  .actions { display: flex; gap: 10px; }
  .btn-clear { padding: 11px 20px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: transparent; font-size: 14px; cursor: pointer; color: var(--text-muted); transition: all .15s; }
  .btn-clear:hover { border-color: #aaa; color: var(--text); }
  .btn-send { flex: 1; padding: 11px; background: var(--green); color: #fff; border: none; border-radius: var(--radius-sm); font-size: 15px; font-weight: 600; cursor: pointer; transition: background .15s; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .btn-send:hover { background: var(--green-dark); }
  .btn-send:disabled { background: #aaa; cursor: not-allowed; }
  .btn-whats { padding: 11px 16px; background: #25D366; color: #fff; border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: background .15s; }
  .btn-whats:hover { background: #1da851; }
  .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--text); color: #fff; padding: 12px 24px; border-radius: 99px; font-size: 14px; font-weight: 500; opacity: 0; transition: all .35s; z-index: 999; white-space: nowrap; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.success { background: var(--green-dark); }
  .toast.error { background: #c0392b; }
  .mb-3 { margin-bottom: 12px; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo">
      <svg viewBox="0 0 24 24"><rect x="1" y="3" width="15" height="13" rx="2"/><path d="M16 8h4l3 3v5h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
    </div>
    <div class="header-text">
      <h1>COMUNICADO DE SERVIÇO TERCEIRIZADO</h1>
      <p>Preencha todos os campos e clique em registrar</p>
    </div>
  </div>

  <!-- Dados do cooperado -->
  <div class="card">
    <div class="section-header">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--text-muted)"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span>Dados do cooperado</span>
    </div>
    <div class="section-body">
      <div class="grid-2 mb-3">
        <div class="field"><label>Nome do cooperado</label><input type="text" id="cooperado" placeholder="Ex: João Silva"></div>
        <div class="field"><label>Operador (abreviado)</label><input type="text" id="operador" placeholder="Ex: IR" maxlength="2" oninput="this.value=this.value.toUpperCase().replace(/[^A-Z]/g,'')"></div>
        <div class="field"><label>Nome completo do operador</label><input type="text" id="operador_nome" placeholder="Ex: MARIA EDUARDA" oninput="this.value=this.value.toUpperCase()"></div>
      </div>
      <div class="grid-3">
        <div class="field"><label>Placa do veículo</label><input type="text" id="placa" placeholder="ABC-1234"></div>
        <div class="field"><label>Modelo do veículo</label><input type="text" id="modelo" placeholder="Ex: Fiat Uno"></div>
        <div class="field"><label>OS (ordem de serviço)</label><input type="text" id="os" placeholder="Ex: 00123"></div>
      </div>
    </div>
  </div>

  <!-- Endereços -->
  <div class="card">
    <div class="section-header">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--text-muted)"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
      <span>Endereços</span>
    </div>
    <div class="section-body">
      <div class="route-box">
        <div class="field">
          <label><span class="origin-label"><span class="dot-green"></span> Origem (local do veículo)</span></label>
          <input type="text" id="origem" placeholder="Rua, número, bairro, cidade" oninput="this.value=this.value.replace(/https?:\/\/[^\s]*/g,'').replace(/www\.[^\s]*/g,'').trim()">
        </div>
        <div class="route-arrow">→</div>
        <div class="field">
          <label><span class="origin-label"><span class="dot-red"></span> Destino (para onde vai)</span></label>
          <input type="text" id="destino" placeholder="Rua, número, bairro, cidade" oninput="this.value=this.value.replace(/https?:\/\/[^\s]*/g,'').replace(/www\.[^\s]*/g,'').trim()">
        </div>
      </div>
    </div>
  </div>

  <!-- Dados do serviço -->
  <div class="card">
    <div class="section-header">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--text-muted)"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
      <span>Dados do serviço</span>
    </div>
    <div class="section-body">
      <div class="grid-3 mb-3">
        <div class="field">
          <label>Tipo de serviço</label>
          <select id="tipo_servico">
            <option value="">Selecione...</option>
            <option>REBOQUE</option>
            <option>CARGA DE BATERIA</option>
            <option>PANE SECA</option>
            <option>TROCA DE PNEU</option>
            <option>Outro</option>
          </select>
        </div>
        <div class="field"><label>Data do atendimento</label><input type="date" id="data"></div>
        <div class="field"><label>Horário do acionamento</label><input type="time" id="horario"></div>
      </div>
      <div class="field">
        <label>Motivo do acionamento</label>
        <div class="radio-group" style="margin-top:4px">
          <div class="radio-option" id="opt1" onclick="selectMotivo('opt1','opt2','SEM REBOQUISTA PRÓPRIO DISPONÍVEL')">
            <input type="radio" name="motivo" id="m1" value="SEM REBOQUISTA PRÓPRIO DISPONÍVEL">
            <label for="m1">Sem reboquista próprio disponível</label>
          </div>
          <div class="radio-option" id="opt2" onclick="selectMotivo('opt2','opt1','SEM SOCORRISTA PRÓPRIO DISPONÍVEL')">
            <input type="radio" name="motivo" id="m2" value="SEM SOCORRISTA PRÓPRIO DISPONÍVEL">
            <label for="m2">Sem socorrista próprio disponível</label>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Prestador -->
  <div class="card">
    <div class="section-header">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--text-muted)"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Dados do prestador terceirizado</span>
    </div>
    <div class="section-body">
      <div class="grid-2">
        <div class="field"><label>Nome do prestador</label><input type="text" id="prestador" placeholder="Nome da empresa ou pessoa"></div>
        <div class="field"><label>Trajeto total (KM)</label><input type="number" id="km" placeholder="Ex: 55" oninput="calcular()"></div>
      </div>
    </div>
  </div>

  <!-- Valores -->
  <div class="card">
    <div class="section-header">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--text-muted)"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
      <span>Valores</span>
    </div>
    <div class="section-body">
      <div class="grid-3 mb-3">
        <div class="field"><label>Valor da saída (R$)</label><input type="number" id="saida" placeholder="Ex: 150,00" oninput="calcular()"></div>
        <div class="field"><label>KM incluídos</label><input type="number" id="km_free" value="40" oninput="calcular()"></div>
        <div class="field"><label>Valor por KM excedente (R$)</label><input type="number" id="km_valor" placeholder="Ex: 2,70" oninput="calcular()"></div>
      </div>
      <div class="grid-2">
        <div class="field"><label>Valor do pedágio (ignorar caso não tenha)</label><input type="number" id="pedagio" placeholder="Se houver pedágio" oninput="calcular()"></div>
        <div class="field"><label>KM excedente calculado</label><input type="text" id="km_exc_display" readonly placeholder="—"></div>
      </div>
    </div>
  </div>

  <div class="total-bar">
    <span class="label">Valor total calculado</span>
    <span class="value" id="total">R$ 0,00</span>
  </div>

  <div class="actions">
    <button class="btn-clear" onclick="limpar()">Limpar</button>
    <button class="btn-whats" onclick="copiarWhatsApp()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      Copiar pra colar no WhatsApp
    </button>
    <button class="btn-send" id="btn-send" onclick="registrar()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      Registrar e enviar
    </button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const WEBHOOK = 'https://hook.us2.make.com/vr13u2uml60rsklv71b2u37fyh7micad';
let motivoSelecionado = '';

function selectMotivo(ativo, outro, valor) {
  document.getElementById(ativo).classList.add('selected');
  document.getElementById(outro).classList.remove('selected');
  document.querySelector('#'+ativo+' input[type=radio]').checked = true;
  motivoSelecionado = valor;
}

function calcular() {
  const saida = parseFloat(document.getElementById('saida').value) || 0;
  const km = parseFloat(document.getElementById('km').value) || 0;
  const kmFree = parseFloat(document.getElementById('km_free').value) || 0;
  const kmValor = parseFloat(document.getElementById('km_valor').value) || 0;
  const pedagio = parseFloat(document.getElementById('pedagio').value) || 0;
  const kmExc = Math.max(0, km - kmFree);
  const total = saida + (kmExc * kmValor) + pedagio;
  document.getElementById('km_exc_display').value = kmExc > 0 ? parseFloat(kmExc.toFixed(2)) + ' km' : '0 km';
  document.getElementById('total').textContent = 'R$ ' + total.toFixed(2).replace('.', ',');
  return { saida, km, kmFree, kmValor, pedagio, kmExc, total };
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + (type || '');
  setTimeout(() => t.className = 'toast', 3500);
}

async function registrar() {
  const vals = calcular();
  const dados = {
    data: document.getElementById('data').value,
    horario: document.getElementById('horario').value,
    os: document.getElementById('os').value,
    cooperado: document.getElementById('cooperado').value,
    operador: document.getElementById('operador').value,
    operador_nome: document.getElementById('operador_nome').value,
    placa: document.getElementById('placa').value,
    modelo: document.getElementById('modelo').value,
    tipo_servico: document.getElementById('tipo_servico').value,
    origem: document.getElementById('origem').value,
    destino: document.getElementById('destino').value,
    motivo: motivoSelecionado,
    prestador: document.getElementById('prestador').value,
    km_rodados: document.getElementById('km').value,
    valor_saida: 'R$ ' + vals.saida.toFixed(2).replace('.', ','),
    km_excedente: vals.kmExc,
    valor_pedagio: 'R$ ' + vals.pedagio.toFixed(2).replace('.', ','),
    valor_total: 'R$ ' + vals.total.toFixed(2).replace('.', ',')
  };

  const obrigatorios = ['cooperado','operador','operador_nome','placa','modelo','os','origem','destino','tipo_servico','prestador','km_rodados'];
  const faltando = obrigatorios.filter(f => !dados[f]);
  if (faltando.length > 0) { showToast('⚠️ Preencha todos os campos obrigatórios', 'error'); return; }
  if (!motivoSelecionado) { showToast('⚠️ Selecione o motivo do acionamento', 'error'); return; }

  const btn = document.getElementById('btn-send');
  btn.disabled = true;
  btn.textContent = 'Enviando...';

  try {
    const params = new URLSearchParams();
    Object.entries(dados).forEach(([k, v]) => params.append(k, v));
    await fetch(WEBHOOK + '?' + params.toString(), {
      method: 'GET',
      mode: 'no-cors'
    });
    showToast('✅ Registrado com sucesso!', 'success');
    setTimeout(limpar, 1000);
  } catch(e) {
    showToast('❌ Erro ao enviar. Tente novamente.', 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg> Registrar e enviar';
  }
}

function limpar() {
  document.querySelectorAll('input:not([type=radio]), select').forEach(el => {
    if (el.id === 'km_free') el.value = '40';
    else if (el.type === 'date' || el.type === 'time') el.value = '';
    else el.value = '';
  });
  document.querySelectorAll('.radio-option').forEach(el => el.classList.remove('selected'));
  document.querySelectorAll('input[type=radio]').forEach(el => el.checked = false);
  document.getElementById('total').textContent = 'R$ 0,00';
  document.getElementById('km_exc_display').value = '';
  motivoSelecionado = '';
  document.getElementById('data').valueAsDate = new Date();
}

document.getElementById('data').valueAsDate = new Date();

function copiarWhatsApp() {
  const vals = calcular();
  const operador_nome = document.getElementById('operador_nome').value || '—';
  const msg = [
    '*COMUNICADO DE SERVIÇO TERCEIRIZADO*',
    '*OS:* ' + (document.getElementById('os').value || '—'),
    '*TIPO SERVIÇO:* ' + (document.getElementById('tipo_servico').value || '—'),
    '*DATA DO ATENDIMENTO:* ' + (document.getElementById('data').value ? document.getElementById('data').value.split('-').reverse().join('/') : '—'),
    '*COOPERADO (A):* ' + (document.getElementById('cooperado').value || '—'),
    '*MODELO:* ' + (document.getElementById('modelo').value || '—'),
    '*PLACA:* ' + (document.getElementById('placa').value || '—'),
    '*ENDEREÇO:* ' + (document.getElementById('origem').value || '—'),
    '*DESTINO:* ' + (document.getElementById('destino').value || '—'),
    '*TRAJETO TOTAL:* ' + (document.getElementById('km').value || '0') + ' KM',
    '*VALOR DA SAÍDA:* R$ ' + vals.saida.toFixed(2).replace('.',','),
    '*KM EXCEDENTE:* ' + (vals.kmExc > 0 ? vals.kmExc + ' km' : '0 KM'),
    '*VALOR DO PEDÁGIO:* R$ ' + vals.pedagio.toFixed(2).replace('.',','),
    '*VALOR TOTAL:* R$ ' + vals.total.toFixed(2).replace('.',','),
    '*PRESTADOR:* ' + (document.getElementById('prestador').value || '—'),
    '*MOTIVO DO ACIONAMENTO:* ' + (motivoSelecionado || '—'),
    '*' + (document.getElementById('operador_nome').value || '—').toUpperCase() + '*'
  ].join('\n');
  navigator.clipboard.writeText(msg)
    .then(() => showToast('✅ Mensagem copiada! Cole no WhatsApp.', 'success'))
    .catch(() => showToast('❌ Erro ao copiar', 'error'));
}

</script>
</body>
</html>
